<h1 id="0%E2%80%931-bfs-a-deque">0–1 BFS: a deque</h1>
<p>For weights in <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.566ex;" xmlns="http://www.w3.org/2000/svg" width="5.531ex" height="2.262ex" role="img" focusable="false" viewBox="0 -750 2444.7 1000"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="7B" d="M434 -231Q434 -244 428 -250H410Q281 -250 230 -184Q225 -177 222 -172T217 -161T213 -148T211 -133T210 -111T209 -84T209 -47T209 0Q209 21 209 53Q208 142 204 153Q203 154 203 155Q189 191 153 211T82 231Q71 231 68 234T65 250T68 266T82 269Q116 269 152 289T203 345Q208 356 208 377T209 529V579Q209 634 215 656T244 698Q270 724 324 740Q361 748 377 749Q379 749 390 749T408 750H428Q434 744 434 732Q434 719 431 716Q429 713 415 713Q362 710 332 689T296 647Q291 634 291 499V417Q291 370 288 353T271 314Q240 271 184 255L170 250L184 245Q202 239 220 230T262 196T290 137Q291 131 291 1Q291 -134 296 -147Q306 -174 339 -192T415 -213Q429 -213 431 -216Q434 -219 434 -231Z"></path></g><g data-mml-node="mn" transform="translate(500,0)"><path data-c="30" d="M96 585Q152 666 249 666Q297 666 345 640T423 548Q460 465 460 320Q460 165 417 83Q397 41 362 16T301 -15T250 -22Q224 -22 198 -16T137 16T82 83Q39 165 39 320Q39 494 96 585ZM321 597Q291 629 250 629Q208 629 178 597Q153 571 145 525T137 333Q137 175 145 125T181 46Q209 16 250 16Q290 16 318 46Q347 76 354 130T362 333Q362 478 354 524T321 597Z"></path></g><g data-mml-node="mo" transform="translate(1000,0)"><path data-c="2C" d="M78 35T78 60T94 103T137 121Q165 121 187 96T210 8Q210 -27 201 -60T180 -117T154 -158T130 -185T117 -194Q113 -194 104 -185T95 -172Q95 -168 106 -156T131 -126T157 -76T173 -3V9L172 8Q170 7 167 6T161 3T152 1T140 0Q113 0 96 17Z"></path></g><g data-mml-node="mn" transform="translate(1444.7,0)"><path data-c="31" d="M213 578L200 573Q186 568 160 563T102 556H83V602H102Q149 604 189 617T245 641T273 663Q275 666 285 666Q294 666 302 660V361L303 61Q310 54 315 52T339 48T401 46H427V0H416Q395 3 257 3 <pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cpp"><span class="hljs-keyword">while</span> (!dq.<span class="hljs-built_in">empty</span>()) {
    Vertex u = dq.<span class="hljs-built_in">front</span>(); dq.<span class="hljs-built_in">pop_front</span>();
    <span class="hljs-keyword">if</span> (dist[u] &lt; <span class="hljs-built_in">cur_dist_of</span>(u)) <span class="hljs-keyword">continue</span>;   <span class="hljs-comment">// stale</span>
    for_each_neighbour(u, [&amp;](Vertex v, Weight w) {
        Distance nd = dist[u] + w;
        <span class="hljs-keyword">if</span> (nd &lt; dist[v]) {
            dist[v] = nd;
            <span class="hljs-keyword">if</span> (w == <span class="hljs-number">0</span>) dq.<span class="hljs-built_in">push_front</span>(v);     <span class="hljs-comment">// same frontier</span>
            <span class="hljs-keyword">else</span>        dq.<span class="hljs-built_in">push_back</span>(v);      <span class="hljs-comment">// next frontier</span>
        }
    });
}
</code></pre>
<p>Invariant: the deque holds <strong>at most two adjacent distance levels</strong>.</p>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cpp">std::vector&lt;std::queue&lt;Vertex&gt;&gt; <span class="hljs-built_in">Q</span>(k + <span class="hljs-number">1</span>);
Q[<span class="hljs-number">0</span>].<span class="hljs-built_in">push</span>(src);
Distance cur = <span class="hljs-number">0</span>;
<span class="hljs-keyword">while</span> (live &gt; <span class="hljs-number">0</span>) {
    std::<span class="hljs-type">uint32_t</span> idx = cur % M;
    <span class="hljs-keyword">while</span> (Q[idx].<span class="hljs-built_in">empty</span>()) { ++cur; idx = cur % M; }     <span class="hljs-comment">// walk forward</span>
    Vertex u = Q[idx].<span class="hljs-built_in">front</span>(); Q[idx].<span class="hljs-built_in">pop</span>();
    <span class="hljs-keyword">if</span> (dist[u] != cur) <span class="hljs-keyword">continue</span>;                        <span class="hljs-comment">// stale slot</span>
    g.for_each_neighbour(u, [&amp;](Vertex v, Weight w) {
        Distance nd = cur + w;
        <span class="hljs-keyword">if</span> (nd &lt; dist[v]) { dist[v] = nd; Q[nd % M].<span class="hljs-built_in">push</span>(v); }
    });
}
</code></pre>

<h1 id="repository-layout">Repository layout</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>include/zkbfs/        header-only algorithms and graph types
  ├─ common.hpp         Vertex / Weight / Distance, RunStats, Timer
  ├─ graph_csr.hpp      classical CSR
  ├─ grid_graph.hpp     implicit grid (no edge storage)
  ├─ dijkstra.hpp       priority_queue baseline
  ├─ bfs01.hpp          0–1 BFS via std::deque
  └─ bfs0k.hpp          0–k BFS via k+1 circular FIFOs
src/
  ├─ main_bench.cpp     CLI benchmark runner → one JSON line per run
  ├─ main_dump.cpp      dumps a graph and distances for visualisation
  └─ main_trace.cpp     instrumented 0–k BFS → events.jsonl
viz/                    Python: sweep driver, plots, GIF animations
</code></pre>
<p>Build: <code>make</code>, or <code>cmake -S . -B build &amp;&amp; cmake --build build</code>.</p>
